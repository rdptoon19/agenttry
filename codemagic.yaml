workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 15
    instance_type: linux
    triggering:
      events:
        - push
    scripts:
      - name: Build Android APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
